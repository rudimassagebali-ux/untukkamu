<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajakan Keluar Sabtu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <div id="slide1" class="slide active">
        <h1>Halo Shasi ❤️</h1>
        <p>Mau nggak hari Sabtu kita keluar bareng?</p>

        <div class="buttons">
            <button class="yes-btn" onclick="nextSlide()">
                Iya Mau
            </button>

            <button class="no-btn" id="noBtn">
                Tolak
            </button>
        </div>
    </div>

    <div id="slide2" class="slide">
        <h1>Asik! 🎉</h1>
        <p>Kita mau ke mana?</p>

        <div class="options">
            <button onclick="selectOption('Makan Enak 🍜')">
                Makan
            </button>

            <button onclick="selectOption('Jalan-Jalan ke Mall 🛍️')">
                Mall
            </button>
        </div>
    </div>

    <div id="slide3" class="slide">
        <h1>Yeay ❤️</h1>
        <p id="result"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
